name: Build and push to ACR

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      # The name of your container registry (without the .azurecr.io suffix).
      # Set this value in the repository settings as a secret named AZURE_ACR_NAME.
      ACR_NAME: ${{ secrets.AZURE_ACR_NAME }}
      # Optional image name inside the registry.
      IMAGE_NAME: myapp
      # Full registry hostname derived from ACR_NAME.
      REGISTRY: ${{ secrets.AZURE_ACR_NAME }}.azurecr.io

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        run: az acr login --name $ACR_NAME

      - name: Build and push Docker image
        run: |
          docker build \
            --file src/Dockerfile \
            --tag $REGISTRY/$IMAGE_NAME:${{ github.sha }} \
            --build-arg ENV_FILE_CONTENT="${{ secrets.ENV }}" \
            src
          docker push $REGISTRY/$IMAGE_NAME:${{ github.sha }}

      - name: Logout from registry
        run: docker logout $REGISTRY
